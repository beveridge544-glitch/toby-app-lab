<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Crypto Watch</title>
  <style>
    :root {
      --bg:        #0d0f14;
      --surface:   #161b27;
      --surface2:  #1e2535;
      --border:    #252d3f;
      --accent:    #4f8ef7;
      --accent2:   #7c5cfc;
      --green:     #22c55e;
      --red:       #ef4444;
      --yellow:    #f59e0b;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --nav-h:     64px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }

    /* Layout */
    #app { display: flex; flex-direction: column; height: 100vh; max-width: 480px; margin: 0 auto; position: relative; }
    .screen { display: none; flex: 1; overflow-y: auto; padding: 16px 16px calc(var(--nav-h) + 16px); }
    .screen.active { display: block; }

    /* Header */
    .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .page-header h1 { font-size: 22px; font-weight: 700; }
    .pill-badge { background: var(--accent2); color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 600; }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 480px;
      height: var(--nav-h); background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-around;
      z-index: 100;
    }
    .nav-btn { display: flex; flex-direction: column; align-items: center; gap: 4px; background: none; border: none; color: var(--muted); cursor: pointer; padding: 8px 16px; transition: color 0.2s; }
    .nav-btn.active { color: var(--accent); }
    .nav-btn svg { width: 22px; height: 22px; }
    .nav-btn span { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }

    /* Cards */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 14px 16px; margin-bottom: 10px; }
    .coin-row { display: flex; align-items: center; gap: 12px; }
    .coin-icon { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; flex-shrink: 0; background: var(--surface2); }
    .coin-icon-placeholder { width: 40px; height: 40px; border-radius: 50%; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; color: var(--accent); flex-shrink: 0; }
    .coin-info { flex: 1; min-width: 0; }
    .coin-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .coin-symbol { font-size: 12px; color: var(--muted); text-transform: uppercase; }
    .coin-price-col { text-align: right; }
    .coin-price { font-weight: 700; font-size: 15px; }
    .change-badge { font-size: 12px; font-weight: 600; padding: 2px 7px; border-radius: 8px; display: inline-block; margin-top: 3px; }
    .change-badge.up { background: rgba(34,197,94,0.15); color: var(--green); }
    .change-badge.down { background: rgba(239,68,68,0.15); color: var(--red); }
    .change-badge.flat { background: rgba(100,116,139,0.15); color: var(--muted); }

    /* Watchlist actions */
    .watchlist-actions { display: flex; gap: 8px; margin-bottom: 16px; }
    .watchlist-actions input {
      flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 14px; color: var(--text); font-size: 14px; outline: none;
    }
    .watchlist-actions input:focus { border-color: var(--accent); }
    .btn { background: var(--accent); color: #fff; border: none; border-radius: 10px; padding: 10px 16px; font-size: 14px; font-weight: 600; cursor: pointer; transition: opacity 0.15s; white-space: nowrap; }
    .btn:active { opacity: 0.8; }
    .btn.danger { background: var(--red); }
    .btn.ghost { background: var(--surface2); color: var(--text); }

    /* Search results */
    #search-results { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
    .search-result-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; cursor: pointer; border-bottom: 1px solid var(--border); transition: background 0.15s; }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover, .search-result-item:active { background: var(--surface2); }
    .sr-symbol { font-weight: 700; font-size: 13px; min-width: 40px; color: var(--accent); }
    .sr-name { font-size: 13px; color: var(--muted); }

    /* Remove button on watchlist */
    .remove-btn { background: none; border: none; color: var(--muted); cursor: pointer; padding: 6px; border-radius: 6px; transition: color 0.15s; }
    .remove-btn:hover { color: var(--red); }

    /* Alerts */
    .alert-form { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 16px; margin-bottom: 16px; }
    .alert-form h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }
    .form-group { margin-bottom: 10px; }
    .form-group label { font-size: 12px; color: var(--muted); font-weight: 500; display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.4px; }
    .form-group input, .form-group select {
      width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
      padding: 9px 12px; color: var(--text); font-size: 14px; outline: none;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
    .form-row { display: flex; gap: 8px; }
    .form-row .form-group { flex: 1; }

    /* Alert card */
    .alert-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 13px 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
    .alert-icon { font-size: 20px; flex-shrink: 0; }
    .alert-info { flex: 1; min-width: 0; }
    .alert-title { font-weight: 600; font-size: 14px; }
    .alert-subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .alert-card.triggered { border-color: var(--yellow); }
    .triggered-tag { font-size: 10px; font-weight: 700; background: rgba(245,158,11,0.15); color: var(--yellow); padding: 2px 6px; border-radius: 6px; margin-left: 6px; }

    /* Markets */
    .market-rank { width: 28px; text-align: center; font-size: 12px; color: var(--muted); font-weight: 600; flex-shrink: 0; }
    .market-cap { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* Toast */
    #toast {
      position: fixed; bottom: calc(var(--nav-h) + 12px); left: 50%; transform: translateX(-50%);
      background: var(--surface2); border: 1px solid var(--border); border-radius: 12px;
      padding: 10px 18px; font-size: 14px; font-weight: 500; color: var(--text);
      z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none;
      white-space: nowrap; max-width: 90vw;
    }
    #toast.show { opacity: 1; }

    /* Loading */
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Refresh indicator */
    .refresh-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .refresh-row span { font-size: 12px; color: var(--muted); }
    .icon-btn { background: none; border: none; color: var(--muted); cursor: pointer; padding: 4px; border-radius: 6px; display: flex; align-items: center; }
    .icon-btn:hover { color: var(--text); }
    .icon-btn svg { width: 16px; height: 16px; }
    .icon-btn.spinning svg { animation: spin 1s linear infinite; }

    /* Empty state */
    .empty-state { text-align: center; padding: 48px 24px; color: var(--muted); }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; line-height: 1.5; }

    /* Mkt summary bar */
    .mkt-summary { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 16px; padding-bottom: 4px; scrollbar-width: none; }
    .mkt-summary::-webkit-scrollbar { display: none; }
    .mkt-chip { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 6px 12px; white-space: nowrap; font-size: 12px; font-weight: 600; }
    .mkt-chip .sym { color: var(--muted); margin-right: 4px; }
  </style>
</head>
<body>
<div id="app">

  <!-- WATCHLIST SCREEN -->
  <div class="screen active" id="screen-watchlist">
    <div class="page-header">
      <h1>Watchlist</h1>
      <div class="refresh-row" style="margin:0">
        <button class="icon-btn" id="refresh-btn" onclick="refreshWatchlist()" title="Refresh">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
        </button>
      </div>
    </div>

    <div class="watchlist-actions">
      <input type="text" id="search-input" placeholder="Search coins… e.g. Bitcoin" autocomplete="off" oninput="onSearchInput()" />
      <button class="btn" onclick="doSearch()">Add</button>
    </div>
    <div id="search-results"></div>

    <div id="last-updated" style="font-size:12px;color:var(--muted);margin-bottom:10px;"></div>
    <div id="watchlist-coins"></div>
  </div>

  <!-- ALERTS SCREEN -->
  <div class="screen" id="screen-alerts">
    <div class="page-header">
      <h1>Alerts</h1>
      <span class="pill-badge" id="alerts-count">0</span>
    </div>

    <div class="alert-form">
      <h3>New Alert</h3>
      <div class="form-group">
        <label>Coin</label>
        <select id="alert-coin-select">
          <option value="">— add coins to watchlist first —</option>
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Condition</label>
          <select id="alert-condition">
            <option value="above">Price goes above</option>
            <option value="below">Price goes below</option>
          </select>
        </div>
        <div class="form-group">
          <label>Target (£)</label>
          <input type="number" id="alert-target" placeholder="e.g. 75000" step="any" min="0" />
        </div>
      </div>
      <button class="btn" style="width:100%;margin-top:4px" onclick="addAlert()">Set Alert</button>
    </div>

    <div id="alerts-list"></div>
  </div>

  <!-- MARKETS SCREEN -->
  <div class="screen" id="screen-markets">
    <div class="page-header">
      <h1>Markets</h1>
      <span class="pill-badge">Top 20</span>
    </div>
    <div class="mkt-summary" id="mkt-summary"></div>
    <div id="markets-list"></div>
  </div>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-watchlist" onclick="showScreen('watchlist')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      <span>Watchlist</span>
    </button>
    <button class="nav-btn" id="nav-alerts" onclick="showScreen('alerts')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      <span>Alerts</span>
    </button>
    <button class="nav-btn" id="nav-markets" onclick="showScreen('markets')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      <span>Markets</span>
    </button>
  </nav>
</div>

<div id="toast"></div>

<script>
// ─── State ───────────────────────────────────────────────────────────────────
let watchlist = JSON.parse(localStorage.getItem('cw_watchlist') || '[]');
// [{id, name, symbol, image}]
let alerts    = JSON.parse(localStorage.getItem('cw_alerts')    || '[]');
// [{id, coinId, coinSymbol, condition, target, triggered}]
let prices    = {}; // coinId -> {price, change24h, marketCap, volume}
let lastUpdated = null;
let refreshTimer = null;
let isRefreshing = false;
let searchTimeout = null;
let searchCache = null;

// ─── Screens ─────────────────────────────────────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('screen-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
  if (name === 'markets') loadMarkets();
}

// ─── Toast ────────────────────────────────────────────────────────────────────
function toast(msg, duration = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

// ─── Format ──────────────────────────────────────────────────────────────────
function fmt(n) {
  if (n === undefined || n === null) return '—';
  if (n >= 1e9)  return '£' + (n/1e9).toFixed(2)  + 'B';
  if (n >= 1e6)  return '£' + (n/1e6).toFixed(2)  + 'M';
  if (n >= 1000) return '£' + n.toLocaleString('en-GB', {maximumFractionDigits:2});
  if (n >= 1)    return '£' + n.toFixed(2);
  return '£' + n.toPrecision(4);
}
function fmtChange(c) {
  if (c === undefined || c === null) return {text:'—', cls:'flat'};
  const sign = c >= 0 ? '+' : '';
  return { text: sign + c.toFixed(2) + '%', cls: c > 0 ? 'up' : c < 0 ? 'down' : 'flat' };
}

// ─── API ──────────────────────────────────────────────────────────────────────
const BASE = 'https://api.coingecko.com/api/v3';

async function fetchPrices(ids) {
  if (!ids.length) return;
  const url = `${BASE}/coins/markets?vs_currency=gbp&ids=${ids.join(',')}&order=market_cap_desc&per_page=50&page=1&sparkline=false`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('API error ' + res.status);
  const data = await res.json();
  data.forEach(c => {
    prices[c.id] = {
      price:     c.current_price,
      change24h: c.price_change_percentage_24h,
      marketCap: c.market_cap,
      volume:    c.total_volume,
      image:     c.image,
      name:      c.name,
      symbol:    c.symbol,
    };
  });
}

async function fetchTopMarkets() {
  const url = `${BASE}/coins/markets?vs_currency=gbp&order=market_cap_desc&per_page=20&page=1&sparkline=false`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('API error ' + res.status);
  return await res.json();
}

async function searchCoins(query) {
  if (!query.trim()) return [];
  const url = `${BASE}/search?query=${encodeURIComponent(query)}`;
  const res = await fetch(url);
  if (!res.ok) return [];
  const data = await res.json();
  return (data.coins || []).slice(0, 6);
}

// ─── Watchlist ────────────────────────────────────────────────────────────────
function saveWatchlist() { localStorage.setItem('cw_watchlist', JSON.stringify(watchlist)); }
function saveAlerts()    { localStorage.setItem('cw_alerts',    JSON.stringify(alerts));    }

function renderWatchlist() {
  const el = document.getElementById('watchlist-coins');
  if (!watchlist.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>Your watchlist is empty.<br>Search for a coin above to add it.</p></div>`;
    return;
  }
  el.innerHTML = watchlist.map(c => {
    const p = prices[c.id];
    const priceStr = p ? fmt(p.price) : '<span style="color:var(--muted)">Loading…</span>';
    const ch = p ? fmtChange(p.change24h) : null;
    const img = (p && p.image) || c.image
      ? `<img class="coin-icon" src="${(p && p.image) || c.image}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" /><div class="coin-icon-placeholder" style="display:none">${c.symbol.slice(0,3).toUpperCase()}</div>`
      : `<div class="coin-icon-placeholder">${c.symbol.slice(0,3).toUpperCase()}</div>`;
    return `
      <div class="card">
        <div class="coin-row">
          ${img}
          <div class="coin-info">
            <div class="coin-name">${c.name}</div>
            <div class="coin-symbol">${c.symbol}</div>
          </div>
          <div class="coin-price-col">
            <div class="coin-price">${priceStr}</div>
            ${ch ? `<span class="change-badge ${ch.cls}">${ch.text}</span>` : ''}
          </div>
          <button class="remove-btn" onclick="removeCoin('${c.id}')" title="Remove">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
      </div>`;
  }).join('');

  if (lastUpdated) {
    document.getElementById('last-updated').textContent = 'Updated ' + lastUpdated.toLocaleTimeString('en-GB');
  }
}

function removeCoin(id) {
  watchlist = watchlist.filter(c => c.id !== id);
  saveWatchlist();
  updateAlertCoinSelect();
  renderWatchlist();
  toast('Removed from watchlist');
}

async function refreshWatchlist() {
  if (isRefreshing) return;
  isRefreshing = true;
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('spinning');
  try {
    const ids = watchlist.map(c => c.id);
    if (ids.length) await fetchPrices(ids);
    lastUpdated = new Date();
    checkAlerts();
    renderWatchlist();
    renderAlerts();
  } catch(e) {
    toast('⚠️ Could not fetch prices');
  } finally {
    isRefreshing = false;
    btn.classList.remove('spinning');
  }
}

// Auto-refresh every 60s
function startAutoRefresh() {
  clearInterval(refreshTimer);
  refreshTimer = setInterval(refreshWatchlist, 60000);
}

// ─── Search ───────────────────────────────────────────────────────────────────
function onSearchInput() {
  clearTimeout(searchTimeout);
  const q = document.getElementById('search-input').value.trim();
  if (!q) { document.getElementById('search-results').innerHTML = ''; return; }
  searchTimeout = setTimeout(() => doSearch(true), 400);
}

async function doSearch(auto = false) {
  const q = document.getElementById('search-input').value.trim();
  if (!q) return;
  const resultsEl = document.getElementById('search-results');
  resultsEl.innerHTML = `<div style="padding:12px 14px;font-size:13px;color:var(--muted)"><span class="spinner"></span>Searching…</div>`;
  const results = await searchCoins(q);
  if (!results.length) {
    resultsEl.innerHTML = `<div style="padding:12px 14px;font-size:13px;color:var(--muted)">No coins found.</div>`;
    return;
  }
  resultsEl.innerHTML = results.map(r => `
    <div class="search-result-item" onclick="addCoin('${r.id}','${escHtml(r.name)}','${r.symbol}','${r.thumb || ''}')">
      <span class="sr-symbol">${r.symbol.toUpperCase()}</span>
      <span class="sr-name">${escHtml(r.name)}</span>
      <span style="margin-left:auto;font-size:11px;color:var(--accent)">+ Add</span>
    </div>`).join('');
}

function escHtml(s) { return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

async function addCoin(id, name, symbol, image) {
  if (watchlist.find(c => c.id === id)) { toast('Already in watchlist'); return; }
  watchlist.push({ id, name, symbol, image });
  saveWatchlist();
  document.getElementById('search-input').value = '';
  document.getElementById('search-results').innerHTML = '';
  updateAlertCoinSelect();
  toast('Added ' + name);
  await refreshWatchlist();
}

// ─── Alerts ───────────────────────────────────────────────────────────────────
function updateAlertCoinSelect() {
  const sel = document.getElementById('alert-coin-select');
  if (!watchlist.length) {
    sel.innerHTML = '<option value="">— add coins to watchlist first —</option>';
    return;
  }
  sel.innerHTML = watchlist.map(c => `<option value="${c.id}">${c.symbol.toUpperCase()} — ${c.name}</option>`).join('');
}

function addAlert() {
  const coinId    = document.getElementById('alert-coin-select').value;
  const condition = document.getElementById('alert-condition').value;
  const target    = parseFloat(document.getElementById('alert-target').value);

  if (!coinId)        { toast('Pick a coin first'); return; }
  if (isNaN(target) || target <= 0) { toast('Enter a valid target price'); return; }

  const coin = watchlist.find(c => c.id === coinId);
  alerts.push({
    id:         Date.now().toString(),
    coinId:     coinId,
    coinSymbol: coin.symbol.toUpperCase(),
    coinName:   coin.name,
    condition:  condition,
    target:     target,
    triggered:  false,
    createdAt:  new Date().toISOString(),
  });
  saveAlerts();
  document.getElementById('alert-target').value = '';
  renderAlerts();
  toast('Alert set!');
}

function deleteAlert(id) {
  alerts = alerts.filter(a => a.id !== id);
  saveAlerts();
  renderAlerts();
  toast('Alert deleted');
}

function checkAlerts() {
  let fired = false;
  alerts.forEach(a => {
    if (a.triggered) return;
    const p = prices[a.coinId];
    if (!p) return;
    const hit = (a.condition === 'above' && p.price >= a.target)
             || (a.condition === 'below' && p.price <= a.target);
    if (hit) {
      a.triggered = true;
      fired = true;
      sendNotification(a, p.price);
    }
  });
  if (fired) saveAlerts();
}

function sendNotification(alert, price) {
  const msg = `${alert.coinSymbol} is now ${fmt(price)} — your ${alert.condition} £${alert.target.toLocaleString()} alert triggered!`;
  toast('🔔 ' + msg, 5000);
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification('Crypto Watch Alert', { body: msg, icon: '/favicon.ico' });
  }
}

function renderAlerts() {
  const el = document.getElementById('alerts-list');
  const count = document.getElementById('alerts-count');
  count.textContent = alerts.length;

  if (!alerts.length) {
    el.innerHTML = `<div class="empty-state"><div class="icon">🔔</div><p>No alerts set yet.<br>Add coins to your watchlist first, then set a price target above.</p></div>`;
    return;
  }

  el.innerHTML = [...alerts].reverse().map(a => {
    const icon = a.condition === 'above' ? '📈' : '📉';
    const cls  = a.triggered ? 'alert-card triggered' : 'alert-card';
    const tag  = a.triggered ? '<span class="triggered-tag">TRIGGERED</span>' : '';
    return `
      <div class="${cls}">
        <div class="alert-icon">${icon}</div>
        <div class="alert-info">
          <div class="alert-title">${a.coinSymbol} ${a.condition} £${a.target.toLocaleString()}${tag}</div>
          <div class="alert-subtitle">${a.coinName} · ${a.condition === 'above' ? 'Notify when price rises above' : 'Notify when price falls below'} £${a.target.toLocaleString()}</div>
        </div>
        <button class="remove-btn" onclick="deleteAlert('${a.id}')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>`;
  }).join('');
}

// ─── Markets ──────────────────────────────────────────────────────────────────
async function loadMarkets() {
  const el = document.getElementById('markets-list');
  if (el.children.length > 0) return; // already loaded
  el.innerHTML = `<div style="text-align:center;padding:32px;color:var(--muted)"><span class="spinner"></span>Loading markets…</div>`;
  try {
    const data = await fetchTopMarkets();
    const summary = document.getElementById('mkt-summary');
    summary.innerHTML = data.slice(0, 5).map(c => {
      const ch = fmtChange(c.price_change_percentage_24h);
      return `<div class="mkt-chip"><span class="sym">${c.symbol.toUpperCase()}</span><span style="color:var(--${ch.cls === 'up' ? 'green' : ch.cls === 'down' ? 'red' : 'muted'})">${ch.text}</span></div>`;
    }).join('');
    el.innerHTML = data.map((c, i) => {
      const ch = fmtChange(c.price_change_percentage_24h);
      const img = c.image ? `<img class="coin-icon" src="${c.image}" onerror="this.style.display='none'" />` : `<div class="coin-icon-placeholder">${c.symbol.slice(0,3).toUpperCase()}</div>`;
      const inWatch = watchlist.find(w => w.id === c.id);
      return `
        <div class="card">
          <div class="coin-row">
            <span class="market-rank">${i+1}</span>
            ${img}
            <div class="coin-info">
              <div class="coin-name">${c.name}</div>
              <div class="market-cap">${fmt(c.market_cap)}</div>
            </div>
            <div class="coin-price-col">
              <div class="coin-price">${fmt(c.current_price)}</div>
              <span class="change-badge ${ch.cls}">${ch.text}</span>
            </div>
            <button class="icon-btn" style="${inWatch?'color:var(--accent)':''}" onclick="quickAdd('${c.id}','${escHtml(c.name)}','${c.symbol}','${c.image}')" title="${inWatch?'In watchlist':'Add to watchlist'}">
              <svg viewBox="0 0 24 24" fill="${inWatch?'currentColor':'none'}" stroke="currentColor" stroke-width="2" width="20" height="20"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            </button>
          </div>
        </div>`;
    }).join('');
  } catch(e) {
    el.innerHTML = `<div class="empty-state"><div class="icon">⚠️</div><p>Couldn't load markets.<br>Check your connection and try again.</p></div>`;
  }
}

async function quickAdd(id, name, symbol, image) {
  if (watchlist.find(c => c.id === id)) {
    toast(symbol.toUpperCase() + ' already in watchlist');
    return;
  }
  watchlist.push({ id, name, symbol, image });
  saveWatchlist();
  updateAlertCoinSelect();
  toast('Added ' + name + ' to watchlist');
  // re-render markets to update star state
  document.getElementById('markets-list').innerHTML = '';
  loadMarkets();
  await refreshWatchlist();
}

// ─── Notification permission ─────────────────────────────────────────────────
function requestNotifPermission() {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
}

// ─── Init ─────────────────────────────────────────────────────────────────────
updateAlertCoinSelect();
renderAlerts();
refreshWatchlist();
startAutoRefresh();
requestNotifPermission();
</script>
</body>
</html>
