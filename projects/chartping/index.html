<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChartPing MVP</title>
  <style>
    :root {
      --bg:#050813;--panel:#0b1022;--card:#111933;--text:#f9fafb;--muted:#9ca3af;
      --mint:#22e3a9;--blue:#3b82f6;--red:#f97070;--line:#2ee6b6;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,Arial,sans-serif;background:linear-gradient(180deg,#050813,#081227);color:var(--text)}
    .wrap{max-width:1100px;margin:0 auto;padding:16px}
    .header{display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap}
    h1{margin:0;font-size:24px} .tag{color:var(--muted);font-size:13px}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    input,button,select{padding:10px;border-radius:10px;border:1px solid #243256;background:#0a1228;color:var(--text)}
    button{cursor:pointer} .primary{background:linear-gradient(90deg,#1c9fff,#16c88d);border:none}
    .layout{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
    .card{background:rgba(255,255,255,.03);border:1px solid #273558;border-radius:14px;padding:12px}
    .list{max-height:560px;overflow:auto}
    .coin{display:grid;grid-template-columns:1fr auto;gap:8px;padding:10px;border:1px solid #253250;border-radius:10px;margin-bottom:8px;cursor:pointer;background:#0a1228}
    .coin:hover{border-color:#3b82f6}
    .sub{font-size:12px;color:var(--muted)}
    .pos{color:var(--mint);font-weight:700}.neg{color:var(--red);font-weight:700}
    .stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;margin-top:10px}
    .pill{background:#0a1228;border:1px solid #273558;border-radius:10px;padding:8px}
    .chart-wrap{margin-top:12px;background:#081124;border:1px solid #273558;border-radius:12px;padding:10px}
    .time{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
    .time button.active{border-color:#16c88d;color:#16c88d}
    svg{width:100%;height:260px;display:block}
    .muted{color:var(--muted)}
    @media(max-width:920px){.layout{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <div>
        <h1>Chart<span style="color:var(--mint)">Ping</span> MVP</h1>
        <div class="tag">Live markets + coin stats + timeframe chart (CoinGecko)</div>
      </div>
      <div class="row">
        <input id="search" placeholder="Search BTC, ETH, SOL..." />
        <select id="currency">
          <option value="gbp">GBP</option>
          <option value="usd">USD</option>
          <option value="eur">EUR</option>
        </select>
        <button id="refresh" class="primary">Refresh</button>
      </div>
    </div>

    <div class="layout">
      <div class="card">
        <h3 style="margin:0 0 8px">Markets</h3>
        <div id="marketStatus" class="sub">Loading…</div>
        <div id="markets" class="list" aria-live="polite"></div>
      </div>

      <div class="card">
        <div id="detailsHeader">
          <h3 style="margin:0">Select a coin</h3>
          <div class="sub">Tap a market row to load details.</div>
        </div>
        <div id="detailsBody" class="muted" style="margin-top:8px">No coin selected.</div>
      </div>
    </div>
  </div>

<script>
const API='https://api.coingecko.com/api/v3';
let state={currency:'gbp',markets:[],selected:null,days:'7'};
const symbols={gbp:'£',usd:'$',eur:'€'};
const fmt=(n,c='gbp')=>`${symbols[c]||''}${Number(n).toLocaleString(undefined,{maximumFractionDigits:n<1?6:2})}`;

async function fetchJSON(url){
  const r=await fetch(url);
  if(!r.ok) throw new Error(`API ${r.status}`);
  return r.json();
}

async function loadMarkets(){
  const status=document.getElementById('marketStatus');
  status.textContent='Loading markets…';
  const q=new URLSearchParams({vs_currency:state.currency,order:'market_cap_desc',per_page:'40',page:'1',price_change_percentage:'24h'});
  try{
    state.markets=await fetchJSON(`${API}/coins/markets?${q}`);
    renderMarkets();
    status.textContent=`Updated ${new Date().toLocaleTimeString()}`;
    if(!state.selected && state.markets.length) loadDetails(state.markets[0].id);
  }catch(e){status.textContent=`Could not load markets (${e.message})`;}
}

function renderMarkets(){
  const q=document.getElementById('search').value.trim().toLowerCase();
  const root=document.getElementById('markets');
  const rows=state.markets.filter(c=>{
    const key=`${c.name} ${c.symbol}`.toLowerCase();
    return !q || key.includes(q);
  });
  root.innerHTML=rows.map(c=>{
    const ch=Number(c.price_change_percentage_24h||0);
    return `<button class="coin" onclick="loadDetails('${c.id}')">
      <div>
        <div><strong>${c.symbol.toUpperCase()}</strong> · ${c.name}</div>
        <div class="sub">Price ${fmt(c.current_price,state.currency)}</div>
      </div>
      <div style="text-align:right">
        <div class="${ch>=0?'pos':'neg'}">${ch>=0?'+':''}${ch.toFixed(2)}%</div>
        <div class="sub">MCap ${fmt(c.market_cap,state.currency)}</div>
      </div>
    </button>`;
  }).join('') || '<div class="sub">No results.</div>';
}

async function loadDetails(id){
  state.selected=id;
  const header=document.getElementById('detailsHeader');
  const body=document.getElementById('detailsBody');
  body.textContent='Loading coin details…';
  try{
    const [coin,chart]=await Promise.all([
      fetchJSON(`${API}/coins/${id}?localization=false&tickers=false&market_data=true&community_data=false&developer_data=false`),
      fetchJSON(`${API}/coins/${id}/market_chart?vs_currency=${state.currency}&days=${state.days}`)
    ]);
    renderDetails(coin,chart.prices||[]);
    const ch=coin.market_data.price_change_percentage_24h||0;
    header.innerHTML=`<h3 style="margin:0">${coin.name} (${coin.symbol.toUpperCase()})</h3><div class="sub ${ch>=0?'pos':'neg'}">24h ${ch>=0?'+':''}${ch.toFixed(2)}%</div>`;
  }catch(e){body.textContent=`Failed to load details (${e.message})`;}
}

function renderDetails(coin,prices){
  const d=coin.market_data;
  document.getElementById('detailsBody').innerHTML=`
    <div class="stats">
      <div class="pill"><div class="sub">Price</div><strong>${fmt(d.current_price[state.currency],state.currency)}</strong></div>
      <div class="pill"><div class="sub">Market Cap</div><strong>${fmt(d.market_cap[state.currency],state.currency)}</strong></div>
      <div class="pill"><div class="sub">24h Volume</div><strong>${fmt(d.total_volume[state.currency],state.currency)}</strong></div>
      <div class="pill"><div class="sub">24h High / Low</div><strong>${fmt(d.high_24h[state.currency],state.currency)} / ${fmt(d.low_24h[state.currency],state.currency)}</strong></div>
    </div>
    <div class="time">
      ${['1','7','30','90'].map(day=>`<button class="${state.days===day?'active':''}" onclick="changeDays('${day}')">${day==='1'?'24h':day+'d'}</button>`).join('')}
    </div>
    <div class="chart-wrap">
      ${renderSVG(prices)}
      <div class="sub">Rank #${coin.market_cap_rank ?? '—'} · Data from CoinGecko</div>
    </div>
  `;
}

function renderSVG(points){
  if(!points.length) return '<div class="sub">No chart data.</div>';
  const w=700,h=260,p=16;
  const ys=points.map(p=>p[1]);
  const min=Math.min(...ys),max=Math.max(...ys);
  const sx=i=>p+(i/(points.length-1||1))*(w-p*2);
  const sy=v=>h-p-((v-min)/((max-min)||1))*(h-p*2);
  const path=points.map((pt,i)=>`${i?'L':'M'}${sx(i).toFixed(2)},${sy(pt[1]).toFixed(2)}`).join(' ');
  return `<svg viewBox="0 0 ${w} ${h}" role="img" aria-label="Price chart">
    <rect x="0" y="0" width="${w}" height="${h}" fill="#081124"/>
    <path d="${path}" stroke="var(--line)" stroke-width="2.4" fill="none"/>
    <text x="${p}" y="${p+6}" fill="#9ca3af" font-size="12">High ${fmt(max,state.currency)}</text>
    <text x="${p}" y="${h-6}" fill="#9ca3af" font-size="12">Low ${fmt(min,state.currency)}</text>
  </svg>`;
}

function changeDays(days){state.days=days; if(state.selected) loadDetails(state.selected);}

document.getElementById('search').addEventListener('input',renderMarkets);
document.getElementById('currency').addEventListener('change',e=>{state.currency=e.target.value; loadMarkets(); if(state.selected) loadDetails(state.selected);});
document.getElementById('refresh').addEventListener('click',()=>{loadMarkets(); if(state.selected) loadDetails(state.selected);});
loadMarkets();
</script>
</body>
</html>
